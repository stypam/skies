<script>
const LT=['B-2','E-4B','VC-25','E-6B','SR-71','U-2'],LC=['SAM','EXEC','AF1','MARINE1'];

};
let ALL=[],FC=[],COL=JSON.parse(localStorage.getItem('rs_col')||'[]'),AIC={},CV=30,CTR=null,SEL=null,FLT='all';
function timeAgo(ts){if(!ts)return'—';const s=Math.max(0,Math.floor(Date.now()/1000)-ts);if(s<60)return s+' sek. temu';if(s<3600)return Math.floor(s/60)+' min. temu';return Math.floor(s/3600)+' godz. temu';}

  if(/^REACH\d+/.test(c)||/^RCH\d+/.test(c))return'C-17 / REACH';

function proc(states){
  const raw=states.filter(s=>s[8]===false).map(s=>({
    icao24:s[0],callsign:(s[1]||'').trim(),origin_country:s[2],last_seen:s[3]||s[4],

    geo_altitude:s[13],squawk:s[14],position_source:s[16]
  }));
  const cl=[];
  for(const s of raw){const x=cls(s);if(x)cl.push({s,r:x.r,t:x.t});}
  cl.sort((a,b)=>({legendary:0,epic:1,rare:2})[a.r]-({legendary:0,epic:1,rare:2})[b.r]||(a.s.callsign>b.s.callsign?1:-1));

function tGlos(el, k, ev){

    document.getElementById('dpnl').addEventListener('scroll', () => { if(tt) tt.classList.remove('show'); });
  }
  
  if (tt.dataset.k === k && tt.classList.contains('show')) {
    tt.classList.remove('show');
    return;
  }
  
  tt.dataset.k = k;
  tt.textContent = GLOS[k] || 'Brak definicji.';
  tt.classList.add('show');
  
  const rect = el.getBoundingClientRect();
  let left = rect.left + (rect.width / 2) - (tt.offsetWidth / 2);
  if(left < 10) left = 10;
  if(left + tt.offsetWidth > window.innerWidth - 10) left = window.innerWidth - tt.offsetWidth - 10;
  
  tt.style.left = left + 'px';
  tt.style.top = (rect.top - tt.offsetHeight - 8) + 'px';
}

function getTacticalAnalysis(s, ctry){
  if(!s)return 'Brak wystarczających danych telemetrycznych z radaru do przeprowadzenia analizy taktycznej.';
  const alt=s.baro_altitude||0, vr=s.vertical_rate||0, spd=s.velocity?Math.round(s.velocity*3.6):0;
  
  let b = `Maszyna zarejestrowana w: ${ctry}. `;
  
  if(s.squawk === '7700') b = `[ALARM] Maszyna nadaje kod Squawk 7700 (General Emergency). Krytyczna awaria na pokładzie! W kontekście napięć geopolitycznych każdy incydent w powietrzu budzi niepokój. `;
  else if(s.squawk === '7600') b = `[ALARM] Squawk 7600 (Radio Failure). Utrata łączności! Zgodnie z protokołami NATO, w przypadku zbliżenia do wrażliwych stref natychmiast podrywane są myśliwce przechwytujące. `;
  else if(s.squawk === '7500') b = `[ALARM KRYTYCZNY] Squawk 7500! Podejrzenie porwania. `;
  
  if(alt>8000 && Math.abs(vr)<3) b+=`Prowadzi stabilny lot przelotowy na pułapie ${alt}m z optymalną prędkością operacyjną ${spd} km/h. To typowy profil dla misji strategicznych (SIGINT, AWACS) monitorujących wschodnią flankę NATO lub aktywność morską, co w obecnej sytuacji globalnej jest absolutnym standardem.`;
  else if(vr>4) b+=`Agresywne wznoszenie (${vr} m/s) przy prędkości ${spd} km/h. Prawdopodobnie szybki start alarmowy (Quick Reaction Alert) w odpowiedzi na niezidentyfikowane cele w przestrzeni powietrznej, co regularnie zdarza się na obrzeżach obszarów konfliktów.`;
  else if(vr<-4) b+=`Obniża lot z prędkością opadania ${Math.abs(vr)} m/s. Prawdopodobnie podchodzi do dyskretnego lądowania w jednej z wysuniętych baz sojuszniczych, dostarczając kluczowy sprzęt lub personel wojskowy na granicę NATO.`;
  else if(alt<3000 && alt>1) b+=`Ryzykownie niski pułap taktyczny (ok. ${alt}m). Taka aktywność często oznacza skryte przerzuty w rejonach zapalnych, omijanie rosyjskich radarów dalekiego zasięgu, lub ciche wsparcie sił specjalnych.`;
  else if(spd>900) b+=`Prędkość taktyczna ponad ${spd} km/h. Prawdopodobnie szybki przerzut sił lub misja o najwyższym priorytecie związanym z najnowszymi informacjami wywiadowczymi.`;
  else b+=`Leci rutynowo (wysokość: ${alt}m, prędkość: ${spd} km/h). Z pozoru spokojny lot, ale w dzisiejszych realiach geopolitycznych nawet "rutynowe" patrole to pokaz siły i gotowości w regionie.`;
  
  return b;
}

    el.innerHTML=!COL.length?'<div class="cemp">Kolekcja pusta.<br>Kliknij ☆ przy samolocie.</div>':
      COL.map(c=>`<div class="ci"><span class="pill ${c.r}">${pLbl(c.r)}</span>
        <div><div class="cics">${c.cs}</div><div class="citp">${c.t} · ${c.ctry||'—'}</div></div>
        <button class="crm" data-id="${c.id}">✕</button></div>`).join('');
    el.querySelectorAll('.crm').forEach(b=>b.addEventListener('click',()=>rmCol(b.dataset.id)));
  }
  p.classList.toggle('open');o.classList.toggle('open');
}
function rmCol(id){COL=COL.filter(c=>c.id!==id);localStorage.setItem('rs_col',JSON.stringify(COL));document.getElementById('tc').textContent=COL.length;if(document.getElementById('cpnl').classList.contains('open')){toggleCol();toggleCol();}}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('tc').textContent=COL.length;
  document.getElementById('tb').addEventListener('click',toggleCol);
  document.getElementById('dov').addEventListener('click',closeD);
  document.getElementById('dxb').addEventListener('click',closeD);
  document.getElementById('cov').addEventListener('click',toggleCol);
  document.getElementById('cxb').addEventListener('click',toggleCol);
  document.querySelectorAll('.fb').forEach(b=>b.addEventListener('click',()=>setF(b.dataset.f)));
  fetchAC();
});
